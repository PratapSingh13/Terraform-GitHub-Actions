name: Terraform CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ap-south-1
  TF_VERSION: 1.14.8

jobs:

  # -------------------------------
  # 1. LINT / FORMAT / VALIDATE
  # -------------------------------
  terraform-checks:
    name: Terraform Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate


  # -------------------------------
  # 2. TERRATEST (ADDED)
  # -------------------------------
  terratest:
    name: Terratest
    runs-on: ubuntu-latest
    needs: terraform-checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: 1.21

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Cache Go Modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('tests/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Init Go Modules
        working-directory: tests
        run: go mod tidy

      - name: Run Terratest
        working-directory: tests
        run: go test -v -timeout 30m


  # -------------------------------
  # 3. TERRAFORM PLAN
  # -------------------------------
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: terratest   # 🔥 UPDATED

    outputs:
      workspace: ${{ steps.workspace.outputs.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Select Workspace
        id: workspace
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            WS="nagarro-promotion"
          else
            WS="dev-nagarro-promotion"
          fi
          echo "workspace=$WS" >> $GITHUB_OUTPUT
          terraform workspace select $WS || terraform workspace new $WS

      - name: Terraform Plan
        run: |
          terraform plan \
            -out=tfplan \
            -var-file="environment/${{ steps.workspace.outputs.workspace }}/terraform.tfvars"

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan


  # -------------------------------
  # 4. MANUAL APPROVAL + APPLY
  # -------------------------------
  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan

    environment:
      name: nagarro-promotion

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Select Workspace
        run: |
          terraform workspace select nagarro-promotion || terraform workspace new nagarro-promotion

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan


  # -------------------------------
  # 5. OPTIONAL: DESTROY (MANUAL ONLY)
  # -------------------------------
  terraform-destroy:
    name: Terraform Destroy (Manual)
    runs-on: ubuntu-latest

    if: github.event_name == 'workflow_dispatch'

    environment:
      name: nagarro-promotion

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init

      - name: Select Workspace
        run: terraform workspace select nagarro-promotion

      - name: Terraform Destroy
        run: terraform destroy -auto-approve \
          -var-file="environment/nagarro-promotion/terraform.tfvars"
